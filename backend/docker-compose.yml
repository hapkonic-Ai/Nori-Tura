version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nonitura-postgres
    environment:
      POSTGRES_USER: nonitura
      POSTGRES_PASSWORD: nonitura123
      POSTGRES_DB: nonitura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
